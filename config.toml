base_url = "https://jahongir.ru"
compile_sass = true
theme = "lekhz"
build_search_index = true

# УДАЛИТЕ taxonomies - lekhz не использует их
# taxonomies = [
# { name = "tags", rss = true },
# { name = "authors", rss = true }
# ]

[markdown]
highlight_theme = "base16-ocean-dark"
render_emoji = true
external_links_target_blank = true
external_links_no_follow = true
external_links_no_referrer = true
smart_punctuation = true
highlight_code = true

[extra]
# Настройки для темы lekhz
lekhz_name = "Jahongir"
lekhz_about = "Мой личный блог о технологиях и разработке"
lekhz_email = "your-email@example.com"
lekhz_resume = "resume.pdf"
lekhz_post_limit = 5

# Социальные профили
lekhz_profiles = [
    { name = "GitHub", url = "https://github.com/jahamars" },
    { name = "Portfolio", url = "https://jahamars.github.io" },
    { name = "Certificates", url = "https://jahamars.github.io/sert" }
]

# lekhz_goatcounter_code = ""  # Опционально для аналитики
